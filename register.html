<body>
    <div class="header">
        <h2 style="margin:0; font-size: 18px; letter-spacing: 2px;">DATABASE PENDIDIKAN</h2>
    </div>

    <div class="container">
        <h3>Registrasi Akses Siswa</h3>
        <p style="font-size: 12px; color: #666;">Data Anda akan diverifikasi oleh CEO yang menyamar secepat mungkin</p>
        <hr>

        <label>Nama Panggilan (Sesuai Absen):</label>
        <input type="text" id="reg-name" placeholder="Contoh: Budi Siregar">

        <label>Classroom Key:</label>
        <input type="text" id="reg-key" placeholder="Masukkan classroom key..." style="text-transform: uppercase;">

        <label style="font-weight:bold;">Verifikasi CAPTCHA:</label>
        <div class="g-recaptcha" data-sitekey="6LfV4oksAAAAAP9wLUl3U5AEOgLGkpRfBMYmfXm5"></div>

        <button id="register-btn">AJUKAN AKSES</button>
        <p><a href="index.html" style="font-size: 12px;">Sudah punya akun? Login di sini</a></p>
    </div>

    <script src="https://www.google.com/recaptcha/api.js" async defer></script>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDE1tJF3p4t-wOFQWLJlQr2eU12KG5_NAc",
            authDomain: "database-pr-sekolah.firebaseapp.com",
            databaseURL: "https://database-pr-sekolah-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "database-pr-sekolah",
            storageBucket: "database-pr-sekolah.firebasestorage.app",
            messagingSenderId: "699468097429",
            appId: "1:699468097429:web:197f697f86e6176e49b89c"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);

        const db = firebase.database();
        const auth = firebase.auth();

        document.getElementById('register-btn').onclick = async () => {
            if (typeof grecaptcha === "undefined") {
                alert("CAPTCHA belum siap, tunggu sebentar!");
                return;
            }

            const captchaResponse = grecaptcha.getResponse();
            if (captchaResponse.length === 0) {
                alert("Silakan centang CAPTCHA sebelum melanjutkan!");
                location.reload();
                return;
            }

            const name = document.getElementById('reg-name').value.trim().toLowerCase();
            const keyInput = document.getElementById('reg-key').value.trim().toUpperCase();

            if (!name || !keyInput) {
                alert("Nama dan Classroom Key wajib diisi!");
                return;
            }

            const keyTonggalan = "TGL5-CEO-A3";
            const keyKlaten2 = "KLT2-SAM-AR";
            let school = "";

            if (keyInput === keyTonggalan) school = "tonggalan";
            else if (keyInput === keyKlaten2) school = "klaten2";
            else {
                alert("Classroom Key salah atau tidak sesuai sekolah!");
                return;
            }

            const confirmed = confirm(`Akun baru akan dibuat untuk '${name}' di ${school}. Lanjutkan?`);
            if (!confirmed) return;

            const nameVerify = prompt("Masukkan nama panggilan lagi untuk verifikasi:").trim().toLowerCase();
            const keyVerify = prompt("Masukkan Classroom Key lagi:").trim().toUpperCase();

            if (nameVerify !== name) {
                alert("Nama panggilan tidak sesuai. Registrasi dibatalkan.");
                return;
            }
            if (keyVerify !== keyInput) {
                alert("Classroom Key tidak sesuai. Registrasi dibatalkan.");
                return;
            }

            const virtualEmail = name + "@sekolah.com";
            const virtualPassword = name + "password1248bit";

            try {
                await auth.createUserWithEmailAndPassword(virtualEmail, virtualPassword);
                await db.ref(`Users/${school}/${name}`).set({
                    status: "unverified",
                    createdAt: new Date().toISOString()
                });
                alert(`Akun berhasil dibuat!`);
                window.location.href = "index.html";
            } catch (err) {
                console.error(err);
                alert("Gagal membuat akun: " + err.message);
            }
        };
    </script>
</body>
