<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIII-DB | Database Tugas Sekolah </title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="header">
    <h2 style="margin:0; font-size: 18px; letter-spacing: 2px;">DIVISI FIII | DATABASE PENDIDIKAN</h2>
</div>

<div class="container" id="login-page">
    <h3>Akses Database Terpadu</h3>
    <hr>

    <label>Nama panggilan Siswa:</label>
    <input type="text" id="user-input" placeholder="Masukkan nama sesuai absen...">

    <label>Classroom Key (Token):</label>
    <input type="text" id="key-input" placeholder="Masukkan kode akses..." style="text-transform: uppercase;">

    <button onclick="handleLogin()">MASUK SISTEM</button>
</div>

<div class="container" id="public-homework">
    <h3 id="school-view-title">Log Tugas</h3>
    <p id="date-info" style="font-size: 11px; color: #1a4a7a; font-weight: bold;"></p>
    <table class="homework-table">
        <thead>
            <tr><th>Mata Pelajaran</th><th>Tugas</th><th>Status</th></tr>
        </thead>
        <tbody id="homework-list"> 
    </tbody>
    </table>
    <button onclick="location.reload()" style="margin-top:20px; background-color: #6c757d;">LOGOUT SISTEM</button>
</div>

<div class="container" id="secret-chat">
    <h3>FIII | Secure Connection</h3>
    <div class="message-box" id="chat-content">
        <p style="color: #adb5bd; font-size: 11px; text-align: center;">-- Sistem Komunikasi Rahasia Aktif --</p>
    </div>
    <input type="text" id="msg-input" placeholder="Kirim pesan...">
    <button onclick="sendMsg()">KIRIM</button>
    <button onclick="location.reload()" style="margin-top:10px; background-color: #dc3545;">PANIC SHUTDOWN</button>
</div>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script src="app.js"></script>

</body>
</html>
